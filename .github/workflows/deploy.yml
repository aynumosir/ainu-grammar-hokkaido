name: Deploy to Cloudflare Workers

# Auto-deploy on every push to main. Without this, a merge ships nothing and
# grammar.aynu.org drifts behind main until someone runs `wrangler deploy` by
# hand — and a hand deploy from a stale checkout silently replaces whatever CI
# last shipped.
#
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as secrets on a
# repository Environment named "deploy". Until those exist this workflow fails
# at the last step; everything before it still guards the branch.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so two pushes cannot race the same custom domain.
concurrency:
  group: cf-workers-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: deploy
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Chapter audit
        run: bun scripts/audit-chapters.ts
      # Build first: the paraglide message modules under src/lib/paraglide are
      # generated by the vite plugin and are not committed, so svelte-check
      # cannot resolve them until a build has produced them.
      - name: Build
        run: bun run build
      - name: Type check
        run: bun run check
      - name: Deploy
        run: bunx wrangler deploy
