name: Test

# Runs on every pull request and every push to main. These checks are all
# local and deterministic — no network, no secrets — so they are safe to make
# blocking. The network-dependent gates (corpus drift, attestation) run on a
# schedule instead; see drift.yml.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # The chapter audit mirrors every SSR-time throw (gloss atoms, cite keys,
      # chapter slugs) plus the corpus-level checks. Errors fail the build.
      - name: Chapter audit
        run: bun scripts/audit-chapters.ts
      - name: Type check
        run: bun run check
      - name: Build
        run: bun run build
      # The apparatus chapters (indexes, search) are generated by the build. If
      # the build changes them, the committed copies are stale.
      - name: Generated apparatus is up to date
        run: |
          if ! git diff --quiet -- src/lib/grammar/chapters; then
            echo "::error::generated chapters differ from the committed copies — run 'bun run build' and commit the result"
            git diff --stat -- src/lib/grammar/chapters
            exit 1
          fi
